AWSTemplateFormatVersion: "2010-09-09"
Description: Developer Role synchronized with Dynamic Policy Export

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  RegionControl:
    Type: String

Resources:
  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      # Match the naming convention for consistency
      RoleName: !Sub "${ProjectName}-${Environment}-developer-role"

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole

      ManagedPolicyArns:
        # CRITICAL: This now includes ${Environment} to match the Policy Stack's Export
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-S3ReadOnlyPolicyArn"

      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ProjectName
          Value: !Ref ProjectName
        - Key: AWSService
          Value: iam
        - Key: RegionControl
          Value: !Ref RegionControl

Outputs:
  RoleArn:
    Value: !GetAtt DeveloperRole.Arn
