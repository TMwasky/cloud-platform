AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  S3ReadOnlyPolicy:
    Type: String
    Description: Inline JSON for the S3 read-only policy

Resources:
  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: developer-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadOnly
          PolicyDocument: !Ref S3ReadOnlyPolicy
