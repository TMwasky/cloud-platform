AWSTemplateFormatVersion: "2010-09-09"
Description: Developer Role with Secure Trust Policy and Dynamic Imports

Parameters:
  Environment:
    Type: String
    Default: ent-it-staging
  ProjectName:
    Type: String
    Default: safe-iac-demo
  RegionControl:
    Type: String
    Default: us-east-1

Resources:
  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      # Using Sub here ensures the role name is unique to the project
      RoleName: !Sub "${ProjectName}-developer-role"

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # Dynamically pulls your current AWS Account ID
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole

      # Correctly nested under Properties
      ManagedPolicyArns:
        - Fn::ImportValue: !Sub "${ProjectName}-S3ReadOnlyPolicyArn"

      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ProjectName
          Value: !Ref ProjectName
        - Key: AWSService
          Value: iam
        - Key: RegionControl
          Value: !Ref RegionControl

Outputs:
  RoleArn:
    Description: ARN of the newly created Developer Role
    Value: !GetAtt DeveloperRole.Arn
