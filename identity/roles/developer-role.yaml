AWSTemplateFormatVersion: "2010-09-09"
Description: Developer Role synchronized with Dynamic Policy Export
# Testing
Parameters:
  Environment:
    Type: String
    Description: "Target environment"
  ProjectName:
    Type: String
  RegionControl:
    Type: String

Resources:
  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-developer-role"

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-S3ReadOnlyPolicyArn"

      Tags:
        - Key: AWSService
          Value: iam

Outputs:
  RoleArn:
    Value: !GetAtt DeveloperRole.Arn
