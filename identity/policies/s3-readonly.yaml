AWSTemplateFormatVersion: "2010-09-09"
Description: S3 Read Only Policy for iac-s3-demo-bucket

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  RegionControl:
    Type: String

Resources:
  S3ReadOnlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      # 1. Unique Name: Avoids collisions and satisfies "naming standard" hooks
      ManagedPolicyName: !Sub "${ProjectName}-${Environment}-s3-readonly-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: arn:aws:s3:::iac-s3-demo-bucket
          - Sid: ObjectAccess
            Effect: Allow
            Action:
              - s3:GetObject
            Resource: arn:aws:s3:::iac-s3-demo-bucket/*
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ProjectName
          Value: !Ref ProjectName
        - Key: AWSService
          Value: iam
        - Key: RegionControl
          Value: !Ref RegionControl

Outputs:
  PolicyArn:
    Value: !Ref S3ReadOnlyPolicy
    Export:
      # 2. Dynamic Export: Matches the unique name logic
      Name: !Sub "${ProjectName}-${Environment}-S3ReadOnlyPolicyArn"
