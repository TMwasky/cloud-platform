name: PR Validation Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "identity/**"
      - "infrastructure/**"
    paths-ignore:
      - "README.md"

jobs:
  validate-templates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate Policy Stack
        run: |
          aws cloudformation validate-template \
            --template-body file://identity/policies/s3-readonly.yaml

      - name: Validate Identity Stack
        run: |
          aws cloudformation validate-template \
            --template-body file://identity/roles/developer-role.yaml

      - name: Validate Infrastructure Stack
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/app.yaml
