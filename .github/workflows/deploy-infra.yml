name: Deploy Infrastructure

# Trigger workflow on push to main or manual trigger
on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Configure AWS credentials from GitHub secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Deploy S3 bucket via CloudFormation
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file identity/roles/developer-role.yaml \
            --stack-name safe-developer-role \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides S3ReadOnlyPolicy="$(cat policies/s3-readonly.json)"
