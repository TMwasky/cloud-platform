name: Deploy Identity

on:
  push:
    branches:
      - main
    paths:
      - "identity/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "ent-it-staging"

jobs:
  deploy-identity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy S3 ReadOnly Policy stack
        run: |
          # 1. Try the deploy
          if ! aws cloudformation deploy \
            --template-file identity/policies/s3-readonly.yaml \
            --stack-name safe-s3-readonly-policy \
            --capabilities CAPABILITY_NAMED_IAM; then
            
            echo "❌ Deployment Failed. Fetching the REAL error message..."
            
            # 2. Get the ID of the failed changeset
            CS_ID=$(aws cloudformation list-change-sets --stack-name safe-s3-readonly-policy --query 'Summaries[0].ChangeSetId' --output text)
            
            # 3. Print the StatusReason (This is where the real error lives)
            aws cloudformation describe-change-set --stack-name safe-s3-readonly-policy --change-set-name $CS_ID --query 'StatusReason' --output text
            
            exit 1
          fi

      - name: Deploy IAM roles stack
        run: |
          aws cloudformation deploy \
            --template-file identity/roles/developer-role.yaml \
            --stack-name safe-developer-role \
            --capabilities CAPABILITY_NAMED_IAM \
            --tags Environment=ent-it-staging ProjectName=safe-iac-demo RegionControl=us-east-1 AWSService=cloudformation
